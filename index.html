<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="grid grid-rows-[8rem_1fr] h-screen md:gap-2 bg-neutral-200 font-serif">

    <header>
        <div class="text-4xl text-gray-900 font-semibold pt-7 lg:pt-10 sm:text-6xl lg:text-7xl text-center ">
            Calculadora Simples
        </div>
    </header>
    <main class="flex justify-center  ">
        <section
            class=" bg-white w-full max-w-4xl h-112 rounded-lg font-sans border-5 border-gray-700 flex justify-center items-center">

            <form class="flex flex-col  gap-2 w-full max-w-xl p-4">

                <div class="flex flex-col gap-2 md:flex-row ">

                    <input
                        class="border-3 rounded-md w-full  h-16 text-center text-3xl focus:outline-none focus:ring-2 focus:ring-gray-500"
                        type="text" id="n1" name="txtN1" placeholder="Digite um número">

                    <input
                        class="border-3 rounded-md w-full  h-16 text-center text-3xl focus:outline-none focus:ring-2 focus:ring-gray-500"
                        type="text" id="n2" name="txtN2" placeholder="Digite um número">



                </div>

                <select
                    class="border-3 rounded-md w-full h-16 text-3xl text-center cursor-pointer focus:ring-2 focus:ring-gray-500"
                    id="operacao" name="slcOperacao">
                    <option value="soma">+</option>
                    <option value="subtracao">-</option>
                    <option value="multiplicacao">x</option>
                    <option value="divisao">÷</option>
                </select>



                <output class="border-3 rounded-md w-full h-16 text-3xl flex items-center justify-center"
                    id="resultado"> Resultado: </output>

                <button type="button"
                    class="border-3 text-3xl bg-gray-300 w-full h-16 rounded cursor-pointer hover:bg-gray-400 hover:scale-102 active:scale-95 transition-all duration-200"
                    id="calcular" onclick="Calculo()">
                    Calcular
                </button>

            </form>



        </section>
    </main>

    <script>

        function Calculo() {

            var n1 = Number(document.getElementById('n1').value);
            var n2 = Number(document.getElementById('n2').value);
            var op = document.getElementById('operacao').value;

            if (!isNaN(n1) && !isNaN(n2)) {

                switch (op) {
                    case "soma":

                        document.getElementById('resultado').textContent = n1 + n2;

                        break;
                    case "subtracao":

                        document.getElementById('resultado').textContent = n1 - n2;

                        break;
                    case "multiplicacao":

                        document.getElementById('resultado').textContent = n1 * n2;

                        break;
                    case "divisao":
                        if (n2 != 0) {
                            document.getElementById('resultado').textContent = n1 / n2;
                        }
                        else {
                            alert("Impossível dividir por 0");
                        }
                        break;

                }

            }
            else {
                alert("Digite números nos dois campos!");
            }




        }

    </script>

</body>

</html>
